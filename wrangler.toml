name = "travellingbeku"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Entry point generated by @opennextjs/cloudflare
main = ".open-next/worker.js"

# Static assets (JS, CSS, images) served from Cloudflare CDN
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# R2 Bucket — single source of truth for blog JSON + images
[[r2_buckets]]
binding  = "R2_BUCKET"
bucket_name = "travellingbeku-content"

# ── Environment Variables ────────────────────────────────
# Set these in the Cloudflare dashboard (Workers → Settings → Variables)
# or via `wrangler secret put VAR_NAME`
#
# Required secrets (DO NOT commit values):
#   AUTH_SECRET          — NextAuth.js secret  (generate: openssl rand -base64 32)
#   ADMIN_USERNAME       — Admin CMS login username
#   ADMIN_PASSWORD       — Admin CMS login password (hashed)
#   R2_ACCOUNT_ID        — Cloudflare Account ID
#   R2_ACCESS_KEY_ID     — R2 API Token access key
#   R2_SECRET_ACCESS_KEY — R2 API Token secret
#   R2_BUCKET_NAME       — "travellingbeku-content"
#   R2_PUBLIC_URL        — Public bucket URL (e.g. https://pub-xxx.r2.dev)

[vars]
NEXT_PUBLIC_SITE_URL = "www.travelingbeku.com"
AUTH_TRUST_HOST = "true"

# ── Local dev bindings (wrangler dev) ───────────────────
[[env.development.r2_buckets]]
binding     = "R2_BUCKET"
bucket_name = "travellingbeku-content"

# Update your wrangler.toml
[[routes]]
pattern = "travelingbeku.com"
custom_domain = true

[[routes]]
pattern = "www.travelingbeku.com"
custom_domain = true